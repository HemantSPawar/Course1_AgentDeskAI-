<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">Vector AI Academy Instagram Profile Logo</title>
  <desc id="desc">Square icon logo with vector V mark and AI node for Instagram profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D6BFF"/>
      <stop offset="100%" stop-color="#7B3CFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0A0F1D" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" rx="260" fill="url(#bg)"/>

  <g transform="translate(540 540)" filter="url(#shadow)">
    <rect x="-300" y="-300" width="600" height="600" rx="160" fill="#FFFFFF" fill-opacity="0.14"/>

    <!-- Vector V -->
    <path d="M-190 -170 L-80 -170 L0 80 L80 -170 L190 -170 L70 210 L-70 210 Z" fill="#FFFFFF"/>

    <!-- AI node accent -->
    <circle cx="205" cy="155" r="42" fill="#E5ECFF"/>
    <circle cx="205" cy="155" r="19" fill="#4B54FF"/>
    <path d="M105 88 C142 100 170 118 192 144" fill="none" stroke="#E5ECFF" stroke-width="20" stroke-linecap="round"/>
  </g>
</svg>
