<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Vector AI Academy Logo</title>
  <desc id="desc">Brand logo for Vector AI Academy with geometric V icon and academy wordmark.</desc>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D6BFF"/>
      <stop offset="100%" stop-color="#7B3CFF"/>
    </linearGradient>
    <linearGradient id="brandSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7FB2FF"/>
      <stop offset="100%" stop-color="#BCA6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0B1020" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1400" height="420" rx="36" fill="#071428"/>

  <g transform="translate(64 62)" filter="url(#shadow)">
    <rect x="0" y="0" width="296" height="296" rx="82" fill="url(#brand)"/>

    <!-- Vector-inspired V mark -->
    <path d="M64 72 L118 72 L148 160 L178 72 L232 72 L170 224 L126 224 Z" fill="#FFFFFF"/>

    <!-- AI node/trace accent -->
    <circle cx="216" cy="208" r="18" fill="#DCE7FF"/>
    <circle cx="216" cy="208" r="9" fill="#4B54FF"/>
    <path d="M182 188 C194 192 202 198 208 206" fill="none" stroke="#DCE7FF" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(410 112)">
    <text x="0" y="90" fill="#F5F8FF" font-size="78" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="800" letter-spacing="0.2">Vector AI Academy</text>
    <text x="0" y="148" fill="url(#brandSoft)" font-size="32" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="600" letter-spacing="0.3">Practical AI Capstone Courses</text>

    <g transform="translate(0 198)">
      <rect x="0" y="0" width="176" height="46" rx="23" fill="#11213F" stroke="#2A4F8E"/>
      <text x="88" y="31" fill="#BFD6FF" text-anchor="middle" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">AGENTS</text>

      <rect x="196" y="0" width="124" height="46" rx="23" fill="#11213F" stroke="#2A4F8E"/>
      <text x="258" y="31" fill="#BFD6FF" text-anchor="middle" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">RAG</text>

      <rect x="340" y="0" width="132" height="46" rx="23" fill="#11213F" stroke="#2A4F8E"/>
      <text x="406" y="31" fill="#BFD6FF" text-anchor="middle" font-size="20" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">MCP</text>
    </g>
  </g>
</svg>
